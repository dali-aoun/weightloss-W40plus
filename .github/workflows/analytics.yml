name: Analytics Snapshot
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/analytics.yml']

jobs:
  analytics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests -q
      - name: Fetch analytics
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          LONG_LIVED_TOKEN: ${{ secrets.LONG_LIVED_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: python analytics/fetch_analytics.py
      - name: Commit snapshot
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add analytics/snapshot.json
          git diff --cached --quiet || git commit -m "chore: analytics snapshot $(date -u +%Y-%m-%dT%H:%M)"
          git push
