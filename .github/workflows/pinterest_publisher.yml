name: Pinterest Publisher

on:
  schedule:
    # 6 pins/jour : 2 slots x 3 pins (2 standard + 1 video/idea)
    # 08h Tunis = 07:00 UTC
    - cron: '0 7 * * *'
    # 17h Tunis = 16:00 UTC
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Date cible (ex: 2026-07-01) - vide = auto'
        required: false
        default: ''
      period:
        description: 'Slot (08h ou 17h) - vide = auto'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests edge-tts

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Publish pins
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          PERIOD: ${{ github.event.inputs.period }}
        working-directory: pinterest
        run: |
          if [ -n "$TARGET_DATE" ] && [ -n "$PERIOD" ]; then
            python publish_period.py "$TARGET_DATE" "$PERIOD"
          else
            python publish_period.py
          fi

      - name: Commit state files
        run: |
          git config user.name "pinterest-bot"
          git config user.email "bot@noreply.github.com"
          git add pinterest/published_done.json pinterest/boards.json pinterest/publish_log.txt pinterest/pin_auto_state.json
          git diff --cached --quiet || git commit -m "publish: $(date -u +%Y-%m-%d_%Hh)"
          git pull --rebase origin main || true
          git push