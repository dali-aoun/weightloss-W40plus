name: Instagram Publisher

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '0 15 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      force_slot:
        description: 'Force slot (ex: 2026-07-01_07h:image)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests
      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg
      - name: Publish
        env:
          LONG_LIVED_TOKEN: ${{ secrets.LONG_LIVED_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          FORCE_SLOT: ${{ github.event.inputs.force_slot }}
        working-directory: instagram
        run: python publisher.py
      - name: Commit state
        run: |
          git config user.name "instagram-bot"
          git config user.email "bot@noreply.github.com"
          git add instagram/published_state.json
          git diff --cached --quiet || git commit -m "ig: $(date -u +%Y-%m-%d_%Hh)"
          git pull --rebase origin main || true
          git push
